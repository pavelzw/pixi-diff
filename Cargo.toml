[package]
name = "pixi-diff-cli"
description = "Generate JSON diffs between pixi lockfiles"
version = "0.1.3"
edition = "2024"

[dependencies]
tracing = "0.1.44"
tracing-subscriber = { version = "0.3.19", features = [
  "default",
  "env-filter",
] }
miette = "7.6.0"
clap = { version = "4.6.0", features = ["derive", "string"] }
clap-verbosity-flag = { version = "3.0.4", features = ["tracing"] }
serde_json = "1.0.149"
rattler_lock = { version = "0.27.5", default-features = false }
pixi_core = { git = "https://github.com/prefix-dev/pixi", tag = "v0.67.0" }
pixi_diff = { git = "https://github.com/prefix-dev/pixi", tag = "v0.67.0" }
pixi_manifest = { git = "https://github.com/prefix-dev/pixi", tag = "v0.67.0", features = [
  "rattler_lock",
] }

[[bin]]
name = "pixi-diff"
path = "src/main.rs"

[patch.crates-io]
# https://github.com/astral-sh/uv/issues/6185
reqwest-middleware = { git = "https://github.com/astral-sh/reqwest-middleware", rev = "7650ed76215a962a96d94a79be71c27bffde7ab2" }
reqwest-retry = { git = "https://github.com/astral-sh/reqwest-middleware", rev = "7650ed76215a962a96d94a79be71c27bffde7ab2" }
